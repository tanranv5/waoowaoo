name: Sync and Build

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: sync-and-build
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/waoowaoo

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync from upstream
        id: sync
        if: github.event_name == 'schedule'
        run: |
          set -euo pipefail
          if ! git remote get-url upstream >/dev/null 2>&1; then
            git remote add upstream https://github.com/waoowaooAI/waoowaoo.git
          fi
          git fetch upstream main
          UPSTREAM_SHA="$(git rev-parse upstream/main)"
          MERGE_BASE_SHA="$(git merge-base HEAD upstream/main)"
          if [ "${UPSTREAM_SHA}" = "${MERGE_BASE_SHA}" ]; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git merge --no-edit upstream/main
          git push origin HEAD:main
          echo "updated=true" >> "$GITHUB_OUTPUT"

      - name: Skip build when no updates
        if: github.event_name == 'schedule' && steps.sync.outputs.updated != 'true'
        run: echo "Skip Docker build because upstream has no new commits."

      - name: Set up Docker Buildx
        if: github.event_name != 'schedule'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'schedule'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        if: github.event_name != 'schedule'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=git-${{ github.sha }}

      - name: Build and push image
        if: github.event_name != 'schedule'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify middleware in image
        if: github.event_name != 'schedule'
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${IMAGE_NAME}:git-${GITHUB_SHA}"
          docker pull "${IMAGE}"
          CID="$(docker run -d -e APP_START_MODE=services_only "${IMAGE}")"
          finish() {
            if ! docker ps -q --no-trunc | grep -q "${CID}"; then
              echo "Container exited unexpectedly."
              docker logs "${CID}" || true
            fi
            docker rm -f "${CID}" >/dev/null 2>&1 || true
          }
          trap finish EXIT

          docker exec "${CID}" sh -lc 'command -v mariadbd'
          docker exec "${CID}" sh -lc 'command -v redis-server'
          docker exec "${CID}" sh -lc 'test -x /app/scripts/docker/start-all-in-one.sh'

          for i in $(seq 1 45); do
            if docker exec "${CID}" sh -lc 'redis-cli -h 127.0.0.1 -p 6379 ping | grep PONG'; then
              break
            fi
            if ! docker ps -q --no-trunc | grep -q "${CID}"; then
              docker logs "${CID}"
              exit 1
            fi
            sleep 2
          done

          for i in $(seq 1 45); do
            if docker exec "${CID}" sh -lc 'mysqladmin ping -h 127.0.0.1 -u"${MYSQL_USER:-waoowaoo}" -p"${MYSQL_PASSWORD:-waoowaoo123}"'; then
              docker exec "${CID}" sh -lc 'node -e "const { PrismaClient } = require('@prisma/client'); const prisma = new PrismaClient(); prisma.\$connect().then(() => prisma.\$disconnect()).then(() => console.log('prisma-ok')).catch((error) => { console.error(error); process.exit(1); });"'
              exit 0
            fi
            if ! docker ps -q --no-trunc | grep -q "${CID}"; then
              docker logs "${CID}"
              exit 1
            fi
            sleep 2
          done

          docker logs "${CID}"
          exit 1
